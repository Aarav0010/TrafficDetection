name: Build Jetson Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up QEMU for multi-architecture builds (ARM64 emulation)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Set up Docker Buildx for cross-compilation
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push the ARM64 image
      - name: Build and push Jetson Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.jetson
          platforms: linux/arm64
          push: true
          tags: ghcr.io/aarav0010/trafficdetection/traffic-detection-jetson:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
